<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>3D Куб</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #222;
            margin: 0;
            overflow: hidden; /* Убираем полосы прокрутки */
        }

        .scene {
            width: 200px;
            height: 200px;
            perspective: 1000px;
        }

        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: rotate 10s infinite linear;
        }

        .face {
            position: absolute;
            width: 200px;
            height: 200px;
            opacity: 0.9;
            border: 2px solid rgba(255,255,255,0.2);
            box-sizing: border-box;
        }

        .front  { background: rgb(255, 0, 0); transform: rotateY(0deg) translateZ(100px); }
        .back   { background: rgb(0, 255, 0); transform: rotateY(180deg) translateZ(100px); }
        .right  { background: rgb(0, 0, 255); transform: rotateY(90deg) translateZ(100px); }
        .left   { background: rgb(255, 255, 0); transform: rotateY(-90deg) translateZ(100px); }
        .top    { background: rgb(255, 0, 255); transform: rotateX(90deg) translateZ(100px); }
        .bottom { background: rgb(0, 255, 255); transform: rotateX(-90deg) translateZ(100px); }

        @keyframes rotate {
            from { transform: rotateX(0deg) rotateY(0deg); }
            to { transform: rotateX(360deg) rotateY(360deg); }
        }
    </style>
</head>
<body>

<div class="scene">
    <div class="cube">
        <div class="face front"></div>
        <div class="face back"></div>
        <div class="face right"></div>
        <div class="face left"></div>
        <div class="face top"></div>
        <div class="face bottom"></div>
    </div>
</div>

</body>
</html>
